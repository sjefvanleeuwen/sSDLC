# Reusable workflow: Centralized Security Bootstrap (Step 0)
# This is the equivalent of the mandatory remote template from the pipeline docs.
# All repositories include this workflow to enforce governance.

name: Security Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # ──────────────────────────────────────────────
  # Step 1: Secret Scanning (Gitleaks)
  # ──────────────────────────────────────────────
  gitleaks:
    name: "Step 1 – Secret Scanning"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # Step 2: Static Analysis (Semgrep SAST)
  # ──────────────────────────────────────────────
  semgrep:
    name: "Step 2 – SAST (Semgrep)"
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        id: semgrep
        run: semgrep scan --config auto --sarif -o semgrep-results.sarif .

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Upload Semgrep artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.sarif
          retention-days: 90

  # ──────────────────────────────────────────────
  # Step 3: Dependency & IaC Scanning (Trivy SCA)
  # ──────────────────────────────────────────────
  trivy:
    name: "Step 3 – SCA / IaC (Trivy)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (filesystem)
        id: trivy-fs
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-fs-results.sarif

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy

      - name: Upload Trivy artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-fs-results.sarif
          retention-days: 90

  # ──────────────────────────────────────────────
  # Step 4: Container Image Scan (Trivy)
  # ──────────────────────────────────────────────
  trivy-image:
    name: "Step 4 – Container Scan (Trivy)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t demo-secure-app:${{ github.sha }} .

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: demo-secure-app:${{ github.sha }}
          severity: HIGH,CRITICAL
          format: table
          exit-code: 1
          skip-dirs: /usr/local/lib/node_modules/npm,/opt/yarn-v1.22.22

  # ──────────────────────────────────────────────
  # Step 5: Vulnerability Coordination (DefectDojo)
  # ──────────────────────────────────────────────
  defectdojo:
    name: "Step 5 – Upload to DefectDojo"
    runs-on: ubuntu-latest
    needs: [semgrep, trivy]
    if: always() && vars.DEFECTDOJO_URL != ''
    steps:
      - name: Download scan artifacts
        uses: actions/download-artifact@v4

      - name: Upload Semgrep to DefectDojo
        if: hashFiles('semgrep-results/semgrep-results.sarif') != ''
        run: |
          curl -s -X POST "${{ vars.DEFECTDOJO_URL }}/api/v2/reimport-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_TOKEN }}" \
            -F "scan_type=SARIF" \
            -F "file=@semgrep-results/semgrep-results.sarif" \
            -F "product_name=${{ github.event.repository.name }}" \
            -F "engagement_name=CI Pipeline"

      - name: Upload Trivy to DefectDojo
        if: hashFiles('trivy-results/trivy-fs-results.sarif') != ''
        run: |
          curl -s -X POST "${{ vars.DEFECTDOJO_URL }}/api/v2/reimport-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_TOKEN }}" \
            -F "scan_type=SARIF" \
            -F "file=@trivy-results/trivy-fs-results.sarif" \
            -F "product_name=${{ github.event.repository.name }}" \
            -F "engagement_name=CI Pipeline"

  # ──────────────────────────────────────────────
  # Step 6: PR Reporting & Evidence
  # ──────────────────────────────────────────────
  pr-report:
    name: "Step 6 – PR Security Report"
    runs-on: ubuntu-latest
    needs: [gitleaks, semgrep, trivy, trivy-image]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Post Security Summary to PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: security-scan-results
          message: |
            ## 🔒 Security Scan Summary

            | Step | Scanner | Category | Status |
            |------|---------|----------|--------|
            | 1 | Gitleaks | Secrets | ${{ needs.gitleaks.result == 'success' && '✅ Pass' || '❌ Fail' }} |
            | 2 | Semgrep | SAST | ${{ needs.semgrep.result == 'success' && '✅ Pass' || '❌ Fail' }} |
            | 3 | Trivy (SCA/IaC) | Dependencies | ${{ needs.trivy.result == 'success' && '✅ Pass' || '❌ Fail' }} |
            | 4 | Trivy (Image) | Container | ${{ needs.trivy-image.result == 'success' && '✅ Pass' || '❌ Fail' }} |

            **SARIF Results:** Inline annotations are visible in the **Files changed** tab.

            <details><summary>Pipeline Details</summary>

            - **Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - **Commit:** `${{ github.event.pull_request.head.sha }}`
            - **Branch:** `${{ github.head_ref }}` → `${{ github.base_ref }}`

            </details>

  # ──────────────────────────────────────────────
  # Gate: All checks must pass before merge
  # ──────────────────────────────────────────────
  security-gate:
    name: "Security Gate (Required)"
    runs-on: ubuntu-latest
    needs: [gitleaks, semgrep, trivy, trivy-image]
    steps:
      - name: All security checks passed
        run: echo "All security scans passed. PR is safe to merge."
